# ── Display (nice!view) ──────────────────────────
# The nice_view shield auto-enables CONFIG_ZMK_DISPLAY.
# These settings enhance what's shown on screen:
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# ── Encoders ─────────────────────────────────────
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ── Bluetooth ────────────────────────────────────
# Increase wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Support 5 BT profiles (switch between Mac, iPad, PC, etc.)
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# ── Power Management ─────────────────────────────
# Deep sleep after 30 min of inactivity (huge battery saver)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
# Idle timeout — display dims after 30 seconds
CONFIG_ZMK_IDLE_TIMEOUT=30000

# ── ZMK Studio ───────────────────────────────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

